<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Builder Stack</title>
  <style>
    body {
      margin: 0;
      background: #f5f6fa;
      color: #1e2229;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 10px;
      color: #6200ea;
      font-weight: 800;
    }
    .info {
      font-size: 1.1rem;
      margin-bottom: 15px;
      display: flex;
      gap: 30px;
      font-weight: 700;
      color: #575e6a;
    }
    canvas {
      background: #fdfdfd;
      border: 3px solid #6200ea;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      cursor: pointer;
    }
    .screen {
      position: absolute;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 80%;
      max-width: 300px;
    }
    button {
      background: #6200ea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      transform: scale(1.04);
    }
    .desc {
      color: #8d949e;
      font-size: 0.85rem;
      margin-top: 15px;
      font-weight: 500;
    }
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      h2 {
        font-size: 1.3rem;
      }
      canvas {
        max-width: 90vw;
        height: auto;
      }
      .desc {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <h2>Tower Builder Stack</h2>
  <div class="info">
    <div>Height: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>
  
  <div style="position: relative; display: flex; align-items: center; justify-content: center;">
    <canvas id="gameCanvas" width="320" height="400"></canvas>
    
    <div class="screen" id="startScreen">
      <h3 style="margin:0; font-size: 1.15rem;">Tower Builder</h3>
      <p style="margin:0; font-size:0.85rem; color:#575e6a; line-height:1.5;">Tap screen or press SPACE to drop the moving block. Stack them as high as you can!</p>
      <button id="startBtn">START</button>
    </div>

    <div class="screen" id="gameOverScreen" style="display: none;">
      <h3 style="color: #6200ea; margin:0; font-size:1.4rem; font-weight:800;">GAME OVER</h3>
      <p style="margin:0; font-weight:600;">Tower Height: <span id="finalScore">0</span></p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <div class="desc">Tap/Click or Space to stack blocks. Align them perfectly!</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const finalScoreEl = document.getElementById('finalScore');
    
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let gameActive = false;
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('best_tower_builder')) || 0;
    bestEl.innerText = bestScore;

    // Game variables
    const blockHeight = 24;
    let blocks = [];
    let currentBlock = {
      x: 0,
      width: 150,
      speed: 3,
      dx: 3
    };

    function initGame() {
      score = 0;
      scoreEl.innerText = score;
      blocks = [
        // Base block at bottom
        { x: 80, width: 160 }
      ];
      resetCurrentBlock(160);
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      requestAnimationFrame(gameLoop);
    }

    function resetCurrentBlock(width) {
      currentBlock.width = width;
      currentBlock.x = 0;
      currentBlock.dx = (3 + (score / 15)) * (Math.random() > 0.5 ? 1 : -1);
    }

    function dropBlock() {
      if (!gameActive) return;

      const baseBlock = blocks[blocks.length - 1];
      
      // Calculate overlapping boundaries
      const left = Math.max(currentBlock.x, baseBlock.x);
      const right = Math.min(currentBlock.x + currentBlock.width, baseBlock.x + baseBlock.width);
      const overlapWidth = right - left;

      if (overlapWidth <= 0) {
        // Drop missed entirely, game over
        triggerGameOver();
      } else {
        // Successfully stacked: trim next block width to overlap
        blocks.push({
          x: left,
          width: overlapWidth
        });
        score++;
        scoreEl.innerText = score;
        
        // Keep screen view centered by dropping bottom stack if it exceeds half screen
        if (blocks.length * blockHeight > canvas.height - 120) {
          blocks.shift(); // scroll up stack
        }

        resetCurrentBlock(overlapWidth);
      }
    }

    // Input handlers
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        dropBlock();
      }
    });
    canvas.addEventListener('mousedown', dropBlock);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      dropBlock();
    });

    function triggerGameOver() {
      gameActive = false;
      finalScoreEl.innerText = score;
      gameOverScreen.style.display = 'flex';
      if (score > bestScore) {
        bestScore = score;
        bestEl.innerText = bestScore;
        localStorage.setItem('best_tower_builder', bestScore);
      }
    }

    function gameLoop() {
      if (!gameActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw all stacked blocks
      blocks.forEach((b, idx) => {
        const y = canvas.height - (idx + 1) * blockHeight;
        ctx.fillStyle = `hsl(${(idx * 15) % 360}, 75%, 60%)`;
        ctx.fillRect(b.x, y, b.width, blockHeight - 2);
        // Bevel stroke
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.strokeRect(b.x, y, b.width, blockHeight - 2);
      });

      // Move current block
      currentBlock.x += currentBlock.dx;
      if (currentBlock.x < 0 || currentBlock.x + currentBlock.width > canvas.width) {
        currentBlock.dx = -currentBlock.dx;
      }

      // Draw current moving block
      const currentY = canvas.height - (blocks.length + 1) * blockHeight;
      ctx.fillStyle = `hsl(${(blocks.length * 15) % 360}, 75%, 60%)`;
      ctx.fillRect(currentBlock.x, currentY, currentBlock.width, blockHeight - 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.strokeRect(currentBlock.x, currentY, currentBlock.width, blockHeight - 2);

      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('click', initGame);
  </script>
</body>
</html>
