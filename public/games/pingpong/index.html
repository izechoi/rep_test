<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Ping Pong</title>
  <style>
    body {
      margin: 0;
      background: #f5f6fa;
      color: #1e2229;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 10px;
      color: #00e676;
      font-weight: 800;
    }
    .info {
      font-size: 1.1rem;
      margin-bottom: 15px;
      display: flex;
      gap: 30px;
      font-weight: 700;
      color: #575e6a;
    }
    canvas {
      background: #111111;
      border: 3px solid #00e676;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      cursor: none;
    }
    .screen {
      position: absolute;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 80%;
      max-width: 300px;
    }
    button {
      background: #00e676;
      color: #1e2229;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      transform: scale(1.04);
    }
    .desc {
      color: #8d949e;
      font-size: 0.85rem;
      margin-top: 15px;
      font-weight: 500;
    }
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      h2 {
        font-size: 1.3rem;
      }
      canvas {
        max-width: 90vw;
        height: auto;
      }
      .desc {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <h2>Neon Ping Pong</h2>
  <div class="info">
    <div>You: <span id="pScore">0</span></div>
    <div>CPU: <span id="cScore">0</span></div>
  </div>
  
  <div style="position: relative; display: flex; align-items: center; justify-content: center;">
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    
    <div class="screen" id="startScreen">
      <h3 style="margin:0; font-size: 1.15rem;">Neon Pong</h3>
      <p style="margin:0; font-size:0.85rem; color:#575e6a; line-height:1.5;">Move your mouse or slide your finger on mobile to slide the left paddle up/down. First to 5 points wins!</p>
      <button id="startBtn">START</button>
    </div>

    <div class="screen" id="gameOverScreen" style="display: none;">
      <h3 style="color: #00e676; margin:0; font-size:1.4rem; font-weight:800;" id="endTitle">YOU WON!</h3>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <div class="desc">Defeat the computer AI paddle! First to 5 wins.</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const pScoreEl = document.getElementById('pScore');
    const cScoreEl = document.getElementById('cScore');
    
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const endTitle = document.getElementById('endTitle');

    let gameActive = false;
    let playerScore = 0;
    let cpuScore = 0;

    const paddleWidth = 10;
    const paddleHeight = 60;

    const user = {
      x: 10,
      y: canvas.height / 2 - paddleHeight / 2,
      color: '#0076ff'
    };

    const cpu = {
      x: canvas.width - 20,
      y: canvas.height / 2 - paddleHeight / 2,
      color: '#ff1744',
      speed: 3.5
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 6,
      speed: 4,
      dx: 4,
      dy: 2,
      color: '#00e676'
    };

    function initGame() {
      playerScore = 0;
      cpuScore = 0;
      pScoreEl.innerText = playerScore;
      cScoreEl.innerText = cpuScore;
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      resetBall();
      requestAnimationFrame(gameLoop);
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = (Math.random() * 2 - 1) * 3;
    }

    // Input handlers
    canvas.addEventListener('mousemove', (e) => {
      if (!gameActive) return;
      const rect = canvas.getBoundingClientRect();
      const root = document.documentElement;
      const mouseY = e.clientY - rect.top - root.scrollTop;
      const scaleY = canvas.height / rect.height;
      user.y = mouseY * scaleY - paddleHeight / 2;
      
      // Boundaries check
      if (user.y < 0) user.y = 0;
      if (user.y > canvas.height - paddleHeight) user.y = canvas.height - paddleHeight;
    });

    // Touch support for mobile
    canvas.addEventListener('touchmove', (e) => {
      if (!gameActive) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const root = document.documentElement;
      const touchY = e.touches[0].clientY - rect.top - root.scrollTop;
      const scaleY = canvas.height / rect.height;
      user.y = touchY * scaleY - paddleHeight / 2;

      if (user.y < 0) user.y = 0;
      if (user.y > canvas.height - paddleHeight) user.y = canvas.height - paddleHeight;
    }, { passive: false });

    function triggerGameOver(win) {
      gameActive = false;
      if (win) {
        endTitle.innerText = "🏆 YOU WON!";
        endTitle.style.color = "#00e676";
      } else {
        endTitle.innerText = "🤖 AI WON!";
        endTitle.style.color = "#ff1744";
      }
      gameOverScreen.style.display = 'flex';
    }

    function gameLoop() {
      if (!gameActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // CPU Simple AI follow
      const cpuTarget = ball.y - paddleHeight / 2;
      if (cpu.y < cpuTarget) {
        cpu.y += cpu.speed;
      } else if (cpu.y > cpuTarget) {
        cpu.y -= cpu.speed;
      }

      // Draw Paddles
      ctx.fillStyle = user.color;
      ctx.fillRect(user.x, user.y, paddleWidth, paddleHeight);
      ctx.fillStyle = cpu.color;
      ctx.fillRect(cpu.x, cpu.y, paddleWidth, paddleHeight);

      // Ball physics & wall bounce
      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
        ball.dy = -ball.dy;
      }

      // Left paddle collision (User)
      if (ball.x - ball.radius < user.x + paddleWidth && ball.x > user.x) {
        if (ball.y > user.y && ball.y < user.y + paddleHeight) {
          ball.dx = -ball.dx;
          // angle depends on hit position
          let relativeHitY = (ball.y - (user.y + paddleHeight/2)) / (paddleHeight/2);
          ball.dy = relativeHitY * 4;
        }
      }

      // Right paddle collision (CPU)
      if (ball.x + ball.radius > cpu.x && ball.x < cpu.x + paddleWidth) {
        if (ball.y > cpu.y && ball.y < cpu.y + paddleHeight) {
          ball.dx = -ball.dx;
          let relativeHitY = (ball.y - (cpu.y + paddleHeight/2)) / (paddleHeight/2);
          ball.dy = relativeHitY * 4;
        }
      }

      // Score check
      if (ball.x < 0) {
        cpuScore++;
        cScoreEl.innerText = cpuScore;
        if (cpuScore >= 5) {
          triggerGameOver(false);
          return;
        } else {
          resetBall();
        }
      } else if (ball.x > canvas.width) {
        playerScore++;
        pScoreEl.innerText = playerScore;
        if (playerScore >= 5) {
          triggerGameOver(true);
          return;
        } else {
          resetBall();
        }
      }

      // Draw Ball
      ctx.fillStyle = ball.color;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // Net line
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();

      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('click', initGame);
  </script>
</body>
</html>
