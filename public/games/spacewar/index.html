<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Space War</title>
  <style>
    body {
      margin: 0;
      background: #f5f6fa;
      color: #1e2229;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 10px;
      color: #00e5ff;
      font-weight: 800;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
    }
    .info {
      font-size: 1.1rem;
      margin-bottom: 15px;
      display: flex;
      gap: 30px;
      font-weight: 700;
      color: #575e6a;
    }
    .game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    canvas {
      background: #000411;
      border: 3px solid #00e5ff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }
    .btn {
      background: #00e5ff;
      color: #000411;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .btn.shoot {
      background: #ff1744;
      color: white;
      padding: 10px 24px;
    }
    .screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      width: 80%;
      max-width: 280px;
      z-index: 10;
    }
    .desc {
      color: #8d949e;
      font-size: 0.85rem;
      margin-top: 15px;
      font-weight: 500;
      text-align: center;
    }
    @media (max-width: 480px) {
      body {
        padding: 5px;
      }
      h2 {
        font-size: 1.25rem;
      }
      canvas {
        max-width: 85vw;
        height: auto;
      }
      .btn {
        padding: 8px 12px;
        font-size: 0.8rem;
      }
      .desc {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <h2>Cyber Space War</h2>
  <div class="info">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>

  <div class="game-area">
    <canvas id="gameCanvas" width="360" height="380"></canvas>

    {/* Screen Overlays */}
    <div class="screen" id="startScreen">
      <h3 style="margin:0; font-size:1.1rem; color:#00e5ff; text-shadow:none;">Space War</h3>
      <p style="margin:0; font-size:0.8rem; color:#575e6a; line-height:1.5;">Defeat the invading aliens! Use Left/Right keys and Space to shoot, or screen buttons below.</p>
      <button class="btn" id="startBtn">START</button>
    </div>

    <div class="screen" id="gameOverScreen" style="display: none;">
      <h3 style="color: #d81b60; margin:0; font-size:1.3rem; font-weight:800;">GAME OVER</h3>
      <p style="margin:0; font-weight:600;">Final Score: <span id="finalScore">0</span></p>
      <button class="btn" id="restartBtn">Play Again</button>
    </div>
  </div>

  <div class="controls" id="controlBar">
    <button class="btn" id="btnLeft">◀ Left</button>
    <button class="btn shoot" id="btnShoot">FIRE 🚀</button>
    <button class="btn" id="btnRight">Right ▶</button>
  </div>

  <div class="desc">Destroy aliens before they touch the ground! Watch out for their speed.</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const finalScoreEl = document.getElementById('finalScore');
    
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let gameActive = false;
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('best_space_war')) || 0;
    bestEl.innerText = bestScore;

    // Ship physics
    const ship = {
      x: canvas.width / 2 - 15,
      y: canvas.height - 35,
      width: 30,
      height: 15,
      speed: 6,
      color: '#00e5ff'
    };

    let bullets = [];
    let aliens = [];
    let alienTimer = 0;
    let keys = {};

    function initGame() {
      score = 0;
      scoreEl.innerText = score;
      ship.x = canvas.width / 2 - 15;
      bullets = [];
      aliens = [];
      alienTimer = 0;
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      requestAnimationFrame(gameLoop);
    }

    function shoot() {
      if (!gameActive) return;
      bullets.push({
        x: ship.x + ship.width / 2,
        y: ship.y,
        radius: 3,
        speed: 7,
        color: '#ffeb3b'
      });
    }

    // Input handlers
    window.addEventListener('keydown', (e) => {
      if ([32, 37, 39, 38, 40].includes(e.keyCode)) e.preventDefault();
      keys[e.key] = true;
      if (e.key === ' ' || e.code === 'Space') {
        shoot();
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    document.getElementById('btnLeft').addEventListener('mousedown', () => { keys['ArrowLeft'] = true; });
    document.getElementById('btnLeft').addEventListener('mouseup', () => { keys['ArrowLeft'] = false; });
    document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowLeft'] = true; });
    document.getElementById('btnLeft').addEventListener('touchend', () => { keys['ArrowLeft'] = false; });

    document.getElementById('btnRight').addEventListener('mousedown', () => { keys['ArrowRight'] = true; });
    document.getElementById('btnRight').addEventListener('mouseup', () => { keys['ArrowRight'] = false; });
    document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowRight'] = true; });
    document.getElementById('btnRight').addEventListener('touchend', () => { keys['ArrowRight'] = false; });

    document.getElementById('btnShoot').addEventListener('click', shoot);

    function spawnAlien() {
      const size = 18;
      aliens.push({
        x: Math.random() * (canvas.width - size * 2) + size,
        y: -size,
        width: size,
        height: size,
        speed: 1.2 + (score / 500),
        color: '#00e676'
      });
    }

    function triggerGameOver() {
      gameActive = false;
      finalScoreEl.innerText = score;
      gameOverScreen.style.display = 'flex';
      if (score > bestScore) {
        bestScore = score;
        bestEl.innerText = bestScore;
        localStorage.setItem('best_space_war', bestScore);
      }
    }

    function gameLoop() {
      if (!gameActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move ship
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        ship.x -= ship.speed;
      }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        ship.x += ship.speed;
      }
      if (ship.x < 0) ship.x = 0;
      if (ship.x > canvas.width - ship.width) ship.x = canvas.width - ship.width;

      // Draw Ship (Cyber Spacecraft)
      ctx.fillStyle = ship.color;
      ctx.beginPath();
      ctx.moveTo(ship.x + ship.width / 2, ship.y);
      ctx.lineTo(ship.x, ship.y + ship.height);
      ctx.lineTo(ship.x + ship.width, ship.y + ship.height);
      ctx.closePath();
      ctx.fill();

      // Spawn Aliens
      alienTimer++;
      const spawnInterval = Math.max(50 - Math.floor(score / 200), 20);
      if (alienTimer > spawnInterval) {
        spawnAlien();
        alienTimer = 0;
      }

      // Move & Draw bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.y -= b.speed;
        
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();

        // Clean out of bounds
        if (b.y < 0) {
          bullets.splice(i, 1);
        }
      }

      // Move & Draw Aliens
      for (let i = aliens.length - 1; i >= 0; i--) {
        const a = aliens[i];
        a.y += a.speed;

        // Draw alien ship
        ctx.fillStyle = a.color;
        ctx.fillRect(a.x, a.y, a.width, a.height);
        // Little eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(a.x + 3, a.y + 4, 3, 3);
        ctx.fillRect(a.x + a.width - 6, a.y + 4, 3, 3);

        // Ground touch gameOver
        if (a.y + a.height > ship.y + 5) {
          triggerGameOver();
          return;
        }

        // Collision bullet vs alien
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (
            b.x > a.x &&
            b.x < a.x + a.width &&
            b.y > a.y &&
            b.y < a.y + a.height
          ) {
            aliens.splice(i, 1);
            bullets.splice(j, 1);
            score += 10;
            scoreEl.innerText = score;
            break;
          }
        }
      }

      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('click', initGame);
  </script>
</body>
</html>
