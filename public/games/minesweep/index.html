<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Mine Finder</title>
  <style>
    body {
      margin: 0;
      background: #f5f6fa;
      color: #1e2229;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 10px;
      color: #2e7d32;
      font-weight: 800;
    }
    .info {
      font-size: 1.1rem;
      margin-bottom: 15px;
      display: flex;
      gap: 30px;
      font-weight: 700;
      color: #575e6a;
    }
    .board-container {
      position: relative;
      background: white;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      border: 3px solid #2e7d32;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(9, 32px);
      grid-template-rows: repeat(9, 32px);
      gap: 2px;
      background: #bdbdbd;
      padding: 2px;
      border-radius: 8px;
    }
    .cell {
      background: #e0e0e0;
      border: 1px solid #eeeeee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }
    .cell.revealed {
      background: #f5f5f5;
      cursor: default;
    }
    .cell.mine {
      background: #e57373 !important;
    }
    .cell:not(.revealed):hover {
      background: #d5d5d5;
    }
    .cell.flag {
      background: #ffecb3;
    }
    .mode-area {
      display: flex;
      justify-content: center;
      margin-top: 15px;
      gap: 10px;
    }
    .btn {
      background: #e0e0e0;
      border: 2px solid #bdbdbd;
      color: #575e6a;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn.active {
      background: #2e7d32;
      color: white;
      border-color: #2e7d32;
      box-shadow: 0 4px 10px rgba(46, 125, 50, 0.2);
    }
    .screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      width: 80%;
      max-width: 260px;
      z-index: 10;
    }
    .desc {
      color: #8d949e;
      font-size: 0.85rem;
      margin-top: 15px;
      font-weight: 500;
      text-align: center;
    }
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      h2 {
        font-size: 1.3rem;
      }
      .board {
        grid-template-columns: repeat(9, 28px);
        grid-template-rows: repeat(9, 28px);
      }
      .cell {
        font-size: 0.85rem;
      }
      .desc {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <h2>Cyber Mine Finder</h2>
  <div class="info">
    <div>Mines Left: <span id="minesLeft">10</span></div>
  </div>

  <div class="board-container">
    <div class="board" id="board"></div>

    <div class="mode-area">
      <button class="btn active" id="modeDig">⛏️ Dig Mode</button>
      <button class="btn" id="modeFlag">🚩 Flag Mode</button>
    </div>

    {/* Screen Overlays */}
    <div class="screen" id="startScreen">
      <h3 style="margin:0; font-size:1.1rem; color:#2e7d32;">Cyber Mine Finder</h3>
      <p style="margin:0; font-size:0.8rem; color:#575e6a; line-height:1.5;">Find all 10 hidden mines! Toggle to Flag Mode to mark mines, or Dig Mode to clear tiles.</p>
      <button class="btn active" id="startBtn">START</button>
    </div>

    <div class="screen" id="gameOverScreen" style="display: none;">
      <h3 style="color: #d81b60; margin:0; font-size:1.3rem; font-weight:800;" id="endTitle">GAME OVER</h3>
      <button class="btn active" id="restartBtn">Play Again</button>
    </div>
  </div>

  <div class="desc">Clear all tiles without stepping on any mines!</div>

  <script>
    const boardEl = document.getElementById('board');
    const minesLeftEl = document.getElementById('minesLeft');
    
    const modeDigBtn = document.getElementById('modeDig');
    const modeFlagBtn = document.getElementById('modeFlag');
    
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const endTitle = document.getElementById('endTitle');

    const SIZE = 9;
    const MINE_COUNT = 10;
    let grid = [];
    let minePositions = [];
    let mode = 'dig'; // 'dig' or 'flag'
    let gameActive = false;
    let revealedCount = 0;
    let flagsCount = 0;

    function initGame() {
      revealedCount = 0;
      flagsCount = 0;
      minesLeftEl.innerText = MINE_COUNT;
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      setMode('dig');
      generateGrid();
      renderBoard();
    }

    function generateGrid() {
      grid = [];
      minePositions = [];
      for (let r = 0; r < SIZE; r++) {
        grid[r] = [];
        for (let c = 0; c < SIZE; c++) {
          grid[r][c] = {
            mine: false,
            revealed: false,
            flagged: false,
            neighborMines: 0
          };
        }
      }

      // Randomly spawn 10 mines
      let spawned = 0;
      while (spawned < MINE_COUNT) {
        const r = Math.floor(Math.random() * SIZE);
        const c = Math.floor(Math.random() * SIZE);
        if (!grid[r][c].mine) {
          grid[r][c].mine = true;
          minePositions.push({ r, c });
          spawned++;
        }
      }

      // Calculate neighbors
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c].mine) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              const nr = r + dr;
              const nc = c + dc;
              if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && grid[nr][nc].mine) {
                count++;
              }
            }
          }
          grid[r][c].neighborMines = count;
        }
      }
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = r;
          cell.dataset.col = c;

          const data = grid[r][c];
          if (data.revealed) {
            cell.classList.add('revealed');
            if (data.mine) {
              cell.classList.add('mine');
              cell.innerText = '💣';
            } else if (data.neighborMines > 0) {
              cell.innerText = data.neighborMines;
              cell.style.color = ['#1976d2', '#388e3c', '#d32f2f', '#7b1fa2', '#ff5722', '#00796b', '#000000', '#555555'][data.neighborMines - 1];
            }
          } else if (data.flagged) {
            cell.classList.add('flag');
            cell.innerText = '🚩';
          }

          cell.addEventListener('click', () => cellClick(r, c));
          boardEl.appendChild(cell);
        }
      }
    }

    function cellClick(r, c) {
      if (!gameActive) return;
      const data = grid[r][c];

      if (mode === 'flag') {
        if (data.revealed) return;
        data.flagged = !data.flagged;
        flagsCount += data.flagged ? 1 : -1;
        minesLeftEl.innerText = MINE_COUNT - flagsCount;
      } else {
        if (data.flagged || data.revealed) return;
        
        data.revealed = true;
        revealedCount++;
        
        if (data.mine) {
          triggerGameOver(false);
          return;
        }
        
        if (data.neighborMines === 0) {
          revealNeighbors(r, c);
        }
        
        if (revealedCount === SIZE * SIZE - MINE_COUNT) {
          triggerGameOver(true);
          return;
        }
      }
      renderBoard();
    }

    function revealNeighbors(r, c) {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr;
          const nc = c + dc;
          if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
            const data = grid[nr][nc];
            if (!data.revealed && !data.mine && !data.flagged) {
              data.revealed = true;
              revealedCount++;
              if (data.neighborMines === 0) {
                revealNeighbors(nr, nc);
              }
            }
          }
        }
      }
    }

    function revealAllMines() {
      minePositions.forEach(pos => {
        grid[pos.r][pos.c].revealed = true;
      });
      renderBoard();
    }

    function triggerGameOver(win) {
      gameActive = false;
      if (win) {
        endTitle.innerText = "🏆 VICTORY!";
        endTitle.style.color = "#2e7d32";
      } else {
        endTitle.innerText = "💣 BOOM! GAME OVER";
        endTitle.style.color = "#d81b60";
        revealAllMines();
      }
      gameOverScreen.style.display = 'flex';
    }

    function setMode(newMode) {
      mode = newMode;
      modeDigBtn.classList.toggle('active', mode === 'dig');
      modeFlagBtn.classList.toggle('active', mode === 'flag');
    }

    modeDigBtn.addEventListener('click', () => setMode('dig'));
    modeFlagBtn.addEventListener('click', () => setMode('flag'));
    startBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('click', initGame);
  </script>
</body>
</html>
