<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Tetris</title>
  <style>
    body {
      margin: 0;
      background: #f5f6fa;
      color: #1e2229;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 10px;
      color: #e65100;
      font-weight: 800;
    }
    .info {
      font-size: 1.1rem;
      margin-bottom: 12px;
      display: flex;
      gap: 30px;
      font-weight: 700;
      color: #575e6a;
    }
    .game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    canvas {
      background: #111;
      border: 3px solid #e65100;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .btn {
      background: #e65100;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      width: 80%;
      max-width: 260px;
      z-index: 10;
    }
    .desc {
      color: #8d949e;
      font-size: 0.8rem;
      margin-top: 10px;
      font-weight: 500;
      text-align: center;
      max-width: 320px;
    }
    @media (max-width: 480px) {
      body {
        padding: 5px;
      }
      h2 {
        font-size: 1.25rem;
        margin-bottom: 5px;
      }
      .info {
        font-size: 0.95rem;
        margin-bottom: 8px;
      }
      canvas {
        max-width: 70vw;
        height: auto;
      }
      .controls {
        gap: 5px;
      }
      .btn {
        padding: 8px 10px;
        font-size: 0.75rem;
      }
      .desc {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <h2>Retro Tetris</h2>
  <div class="info">
    <div>Score: <span id="score">0</span></div>
  </div>
  
  <div class="game-area">
    <canvas id="gameCanvas" width="220" height="400"></canvas>
    
    <div class="screen" id="startScreen">
      <h3 style="margin:0; font-size:1.1rem; color:#e65100;">Classic Tetris</h3>
      <p style="margin:0; font-size:0.8rem; color:#575e6a; line-height:1.5;">Clear lines by stacking shapes! Use Keyboard Arrow keys or screen buttons below to control.</p>
      <button class="btn" id="startBtn">START</button>
    </div>

    <div class="screen" id="gameOverScreen" style="display: none;">
      <h3 style="color: #d81b60; margin:0; font-size:1.3rem; font-weight:800;">GAME OVER</h3>
      <p style="margin:0; font-weight:600;">Final Score: <span id="finalScore">0</span></p>
      <button class="btn" id="restartBtn">Play Again</button>
    </div>
  </div>

  <div class="controls" id="controlBar">
    <button class="btn" id="btnLeft">◀</button>
    <button class="btn" id="btnRot">Rotate</button>
    <button class="btn" id="btnRight">▶</button>
    <button class="btn" id="btnDown">▼</button>
    <button class="btn" id="btnDrop">Drop</button>
  </div>

  <div class="desc">Left/Right arrows to move, Up to rotate, Down to drop. Stack blocks neatly!</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('finalScore');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let gameActive = false;
    let score = 0;

    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 20;

    let board = [];
    function initBoard() {
      board = [];
      for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
          board[r][c] = 0;
        }
      }
    }

    const SHAPES = [
      [],
      [[1, 1, 1, 1]], // I
      [[1, 1, 1], [0, 1, 0]], // T
      [[1, 1, 1], [1, 0, 0]], // L
      [[1, 1, 1], [0, 0, 1]], // J
      [[1, 1], [1, 1]], // O
      [[1, 1, 0], [0, 1, 1]], // Z
      [[0, 1, 1], [1, 1, 0]]  // S
    ];

    const COLORS = [
      null,
      '#00e5ff', // Cyan
      '#d500f9', // Purple
      '#ffab00', // Orange
      '#2979ff', // Blue
      '#ffd600', // Yellow
      '#ff1744', // Red
      '#00e676'  // Green
    ];

    let currentPiece = {
      matrix: null,
      x: 0,
      y: 0,
      colorId: 0
    };

    function spawnPiece() {
      const id = Math.floor(Math.random() * 7) + 1;
      currentPiece.matrix = SHAPES[id];
      currentPiece.colorId = id;
      currentPiece.y = 0;
      currentPiece.x = Math.floor((COLS - currentPiece.matrix[0].length) / 2);

      if (collide()) {
        triggerGameOver();
      }
    }

    function collide() {
      const m = currentPiece.matrix;
      for (let r = 0; r < m.length; r++) {
        for (let c = 0; c < m[r].length; c++) {
          if (m[r][c] !== 0) {
            const nextX = currentPiece.x + c;
            const nextY = currentPiece.y + r;
            if (nextX < 0 || nextX >= COLS || nextY >= ROWS) {
              return true;
            }
            if (nextY >= 0 && board[nextY][nextX] !== 0) {
              return true;
            }
          }
        }
      }
      return false;
    }

    function merge() {
      const m = currentPiece.matrix;
      for (let r = 0; r < m.length; r++) {
        for (let c = 0; c < m[r].length; c++) {
          if (m[r][c] !== 0) {
            board[currentPiece.y + r][currentPiece.x + c] = currentPiece.colorId;
          }
        }
      }
    }

    function rotate(matrix) {
      const n = matrix.length;
      const m = matrix[0].length;
      let rotated = [];
      for (let c = 0; c < m; c++) {
        rotated[c] = [];
        for (let r = 0; r < n; r++) {
          rotated[c][r] = matrix[n - 1 - r][c];
        }
      }
      return rotated;
    }

    function rotatePiece() {
      const original = currentPiece.matrix;
      currentPiece.matrix = rotate(currentPiece.matrix);
      if (collide()) {
        currentPiece.matrix = original;
      }
    }

    function moveLeft() {
      currentPiece.x--;
      if (collide()) currentPiece.x++;
    }

    function moveRight() {
      currentPiece.x++;
      if (collide()) currentPiece.x--;
    }

    function moveDown() {
      currentPiece.y++;
      if (collide()) {
        currentPiece.y--;
        merge();
        clearLines();
        spawnPiece();
      }
      dropCounter = 0;
    }

    function hardDrop() {
      while (!collide()) {
        currentPiece.y++;
      }
      currentPiece.y--;
      merge();
      clearLines();
      spawnPiece();
      dropCounter = 0;
    }

    function clearLines() {
      let linesCleared = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        let full = true;
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] === 0) {
            full = false;
            break;
          }
        }
        if (full) {
          board.splice(r, 1);
          board.unshift(new Array(COLS).fill(0));
          linesCleared++;
          r++; // Check same row index again after splice
        }
      }
      if (linesCleared > 0) {
        score += [0, 40, 100, 300, 1200][linesCleared] || 1200;
        scoreEl.innerText = score;
      }
    }

    let dropCounter = 0;
    let dropInterval = 1000; // 1 second
    let lastTime = 0;

    function gameLoop(time = 0) {
      if (!gameActive) return;
      
      const deltaTime = time - lastTime;
      lastTime = time;
      
      dropCounter += deltaTime;
      if (dropCounter > dropInterval) {
        moveDown();
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid board
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] !== 0) {
            ctx.fillStyle = COLORS[board[r][c]];
            ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
          }
        }
      }

      // Draw current piece
      if (currentPiece.matrix) {
        ctx.fillStyle = COLORS[currentPiece.colorId];
        const m = currentPiece.matrix;
        for (let r = 0; r < m.length; r++) {
          for (let c = 0; c < m[r].length; c++) {
            if (m[r][c] !== 0) {
              ctx.fillRect((currentPiece.x + c) * BLOCK_SIZE, (currentPiece.y + r) * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
            }
          }
        }
      }
    }

    function initGame() {
      score = 0;
      scoreEl.innerText = score;
      initBoard();
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      spawnPiece();
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    function triggerGameOver() {
      gameActive = false;
      finalScoreEl.innerText = score;
      gameOverScreen.style.display = 'flex';
    }

    // Keyboard handlers
    window.addEventListener('keydown', (e) => {
      if (!gameActive) return;
      if (e.key === 'ArrowLeft') {
        moveLeft();
        draw();
      } else if (e.key === 'ArrowRight') {
        moveRight();
        draw();
      } else if (e.key === 'ArrowDown') {
        moveDown();
        draw();
      } else if (e.key === 'ArrowUp') {
        rotatePiece();
        draw();
      } else if (e.key === 'Space') {
        e.preventDefault();
        hardDrop();
        draw();
      }
    });

    // Mobile buttons bindings
    document.getElementById('btnLeft').addEventListener('click', () => { moveLeft(); draw(); });
    document.getElementById('btnRight').addEventListener('click', () => { moveRight(); draw(); });
    document.getElementById('btnRot').addEventListener('click', () => { rotatePiece(); draw(); });
    document.getElementById('btnDown').addEventListener('click', () => { moveDown(); draw(); });
    document.getElementById('btnDrop').addEventListener('click', () => { hardDrop(); draw(); });

    startBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('click', initGame);
  </script>
</body>
</html>
