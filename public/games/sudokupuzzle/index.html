<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Sudoku Lite</title>
  <style>
    body {
      margin: 0;
      background: #f5f6fa;
      color: #1e2229;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 10px;
      color: #6a1b9a;
      font-weight: 800;
    }
    .info {
      font-size: 1.1rem;
      margin-bottom: 15px;
      display: flex;
      gap: 30px;
      font-weight: 700;
      color: #575e6a;
    }
    .board-container {
      position: relative;
      background: white;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      border: 3px solid #6a1b9a;
      width: 90%;
      max-width: 320px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 4px;
      background: #bdbdbd;
      padding: 4px;
      border-radius: 8px;
    }
    .cell {
      background: #ffffff;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      border-radius: 4px;
      color: #37474f;
    }
    .cell.selected {
      background: #e1bee7;
      box-shadow: inset 0 0 0 3px #9c27b0;
    }
    .cell.given {
      background: #eceff1;
      color: #78909c;
      cursor: default;
    }
    .cell.error {
      color: #d32f2f !important;
    }
    /* 2x2 Subgrid border helpers */
    .cell:nth-child(even) {
      margin-right: 2px;
    }
    .cell:nth-child(n+9):nth-child(-n+12) {
      margin-top: 2px;
    }
    .num-pad {
      margin-top: 15px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .btn {
      background: #6a1b9a;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .btn.action {
      background: #9e9e9e;
      font-size: 0.85rem;
    }
    .screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      width: 80%;
      max-width: 250px;
      z-index: 10;
    }
    .desc {
      color: #8d949e;
      font-size: 0.85rem;
      margin-top: 15px;
      font-weight: 500;
      text-align: center;
    }
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      h2 {
        font-size: 1.3rem;
      }
      .cell {
        height: 48px;
        font-size: 1.3rem;
      }
      .desc {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <h2>Cyber Sudoku Lite</h2>
  <div class="info">
    <div style="color: #6a1b9a;">4x4 Mini Sudoku</div>
  </div>

  <div class="board-container">
    <div class="board" id="board"></div>

    <div class="num-pad">
      <button class="btn num-btn">1</button>
      <button class="btn num-btn">2</button>
      <button class="btn num-btn">3</button>
      <button class="btn num-btn">4</button>
      <button class="btn action" id="btnErase">X</button>
    </div>

    {/* Screen Overlays */}
    <div class="screen" id="startScreen">
      <h3 style="margin:0; font-size:1.1rem; color:#6a1b9a;">Mini Sudoku</h3>
      <p style="margin:0; font-size:0.8rem; color:#575e6a; line-height:1.5;">Fill grid with numbers 1 to 4! No duplicate numbers in any row, column, or 2x2 square box.</p>
      <button class="btn" id="startBtn" style="padding:10px 20px;">START</button>
    </div>

    <div class="screen" id="gameOverScreen" style="display: none;">
      <h3 style="color: #2e7d32; margin:0; font-size:1.4rem; font-weight:800;">🏆 SOLVED!</h3>
      <p style="margin:0; font-size:0.85rem; color:#575e6a;">Congratulations, you solved the sudoku puzzle!</p>
      <button class="btn" id="restartBtn" style="padding:10px 20px;">Play Again</button>
    </div>
  </div>

  <div class="desc">Tap a cell, then tap a number to fill it in! Clear errors to complete.</div>

  <script>
    const boardEl = document.getElementById('board');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const btnErase = document.getElementById('btnErase');

    // Solution sheet
    const SOLUTIONS = [
      [1, 2, 3, 4, 3, 4, 1, 2, 2, 3, 4, 1, 4, 1, 2, 3],
      [4, 3, 2, 1, 1, 2, 4, 3, 3, 4, 1, 2, 2, 1, 3, 4],
      [2, 1, 4, 3, 4, 3, 2, 1, 1, 2, 3, 4, 3, 4, 1, 2]
    ];

    let currentSolution = [];
    let boardState = []; // 0 for blank
    let selectedCellIdx = null;
    let gameActive = false;

    function initGame() {
      // Pick a random solution template
      const solIdx = Math.floor(Math.random() * SOLUTIONS.length);
      currentSolution = SOLUTIONS[solIdx];
      
      boardState = [];
      selectedCellIdx = null;
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';

      // Hide 7 to 9 cells for puzzle
      const hideIndices = [];
      while (hideIndices.length < 8) {
        const rIdx = Math.floor(Math.random() * 16);
        if (!hideIndices.includes(rIdx)) {
          hideIndices.push(rIdx);
        }
      }

      for (let i = 0; i < 16; i++) {
        boardState.push({
          val: hideIndices.includes(i) ? 0 : currentSolution[i],
          given: !hideIndices.includes(i),
          error: false
        });
      }

      renderBoard();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      for (let i = 0; i < 16; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const data = boardState[i];

        if (data.given) {
          cell.classList.add('given');
          cell.innerText = data.val;
        } else {
          if (data.val !== 0) {
            cell.innerText = data.val;
          }
          
          if (data.error) {
            cell.classList.add('error');
          }
          
          if (selectedCellIdx === i) {
            cell.classList.add('selected');
          }

          cell.addEventListener('click', () => cellClick(i));
        }

        boardEl.appendChild(cell);
      }
    }

    function cellClick(idx) {
      if (!gameActive) return;
      selectedCellIdx = idx;
      renderBoard();
    }

    // Number Pad events
    document.querySelectorAll('.num-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!gameActive || selectedCellIdx === null) return;
        const num = parseInt(btn.innerText);
        fillNumber(num);
      });
    });

    btnErase.addEventListener('click', () => {
      if (!gameActive || selectedCellIdx === null) return;
      fillNumber(0);
    });

    function fillNumber(num) {
      const cell = boardState[selectedCellIdx];
      if (cell.given) return;

      cell.val = num;
      cell.error = false;
      
      // Perform validation check
      validateBoard();
      renderBoard();
      
      // Check Win
      checkWin();
    }

    function validateBoard() {
      // Validate entries compared to current solution
      for (let i = 0; i < 16; i++) {
        if (!boardState[i].given && boardState[i].val !== 0) {
          // If value is filled but doesn't match the solution value, mark error
          boardState[i].error = boardState[i].val !== currentSolution[i];
        }
      }
    }

    function checkWin() {
      let solved = true;
      for (let i = 0; i < 16; i++) {
        if (boardState[i].val === 0 || boardState[i].error) {
          solved = false;
          break;
        }
      }

      if (solved && gameActive) {
        gameActive = false;
        gameOverScreen.style.display = 'flex';
      }
    }

    startBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('click', initGame);
  </script>
</body>
</html>
