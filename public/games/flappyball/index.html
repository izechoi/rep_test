<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Flappy Ball</title>
  <style>
    body {
      margin: 0;
      background: #f5f6fa;
      color: #1e2229;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 10px;
      color: #d81b60;
      font-weight: 800;
    }
    .info {
      font-size: 1.1rem;
      margin-bottom: 15px;
      display: flex;
      gap: 30px;
      font-weight: 700;
      color: #575e6a;
    }
    canvas {
      background: #eef2f7;
      border: 3px solid #d81b60;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      cursor: pointer;
    }
    .screen {
      position: absolute;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 80%;
      max-width: 300px;
    }
    button {
      background: #d81b60;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.04);
    }
    .desc {
      color: #8d949e;
      font-size: 0.85rem;
      margin-top: 15px;
      font-weight: 500;
    }
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      h2 {
        font-size: 1.3rem;
      }
      canvas {
        max-width: 90vw;
        height: auto;
      }
      .desc {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <h2>Cyber Flappy Ball</h2>
  <div class="info">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>
  
  <div style="position: relative; display: flex; align-items: center; justify-content: center;">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="screen" id="startScreen">
      <h3 style="margin:0; font-size: 1.15rem;">Flappy Ball</h3>
      <p style="margin:0; font-size:0.85rem; color:#575e6a; line-height:1.5;">Click screen, tap, or press SPACE to jump and flap through pipes.</p>
      <button id="startBtn">START</button>
    </div>

    <div class="screen" id="gameOverScreen" style="display: none;">
      <h3 style="color: #d81b60; margin:0; font-size:1.4rem; font-weight:800;">GAME OVER</h3>
      <p style="margin:0; font-weight:600;">Final Score: <span id="finalScore">0</span></p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <div class="desc">Tap/Click or Space to jump! Pass between obstacles.</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const finalScoreEl = document.getElementById('finalScore');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let gameActive = false;
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('best_flappy_ball')) || 0;
    bestEl.innerText = bestScore;

    // Physics
    const ball = {
      x: 100,
      y: 200,
      radius: 12,
      gravity: 0.4,
      velocity: 0,
      jump: -6.5,
      color: '#d81b60'
    };

    let pipes = [];
    const pipeWidth = 50;
    const pipeGap = 130;
    const pipeSpeed = 2;
    let spawnTimer = 0;

    function initGame() {
      score = 0;
      scoreEl.innerText = score;
      ball.y = 200;
      ball.velocity = 0;
      pipes = [];
      spawnTimer = 0;
      gameActive = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      requestAnimationFrame(gameLoop);
    }

    function jump() {
      if (gameActive) {
        ball.velocity = ball.jump;
      }
    }

    // Input bindings
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        jump();
      }
    });
    canvas.addEventListener('mousedown', jump);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      jump();
    });

    function spawnPipe() {
      // Random gap Y position
      const minHeight = 50;
      const maxHeight = canvas.height - pipeGap - minHeight;
      const topHeight = Math.floor(Math.random() * (maxHeight - minHeight)) + minHeight;
      
      pipes.push({
        x: canvas.width,
        topHeight: topHeight,
        bottomHeight: canvas.height - topHeight - pipeGap,
        passed: false
      });
    }

    function triggerGameOver() {
      gameActive = false;
      finalScoreEl.innerText = score;
      gameOverScreen.style.display = 'flex';
      if (score > bestScore) {
        bestScore = score;
        bestEl.innerText = bestScore;
        localStorage.setItem('best_flappy_ball', bestScore);
      }
    }

    function gameLoop() {
      if (!gameActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Gravity math
      ball.velocity += ball.gravity;
      ball.y += ball.velocity;

      // Draw Ball
      ctx.fillStyle = ball.color;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // Floor & Ceiling check
      if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
        triggerGameOver();
        return;
      }

      // Pipe generator
      spawnTimer++;
      if (spawnTimer > 90) {
        spawnPipe();
        spawnTimer = 0;
      }

      // Render pipes & handle check
      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= pipeSpeed;

        // Draw top pipe
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath();
        ctx.rect(p.x, 0, pipeWidth, p.topHeight);
        ctx.fill();

        // Draw bottom pipe
        ctx.beginPath();
        ctx.rect(p.x, canvas.height - p.bottomHeight, pipeWidth, p.bottomHeight);
        ctx.fill();

        // Collision test
        if (
          ball.x + ball.radius > p.x &&
          ball.x - ball.radius < p.x + pipeWidth &&
          (ball.y - ball.radius < p.topHeight || ball.y + ball.radius > canvas.height - p.bottomHeight)
        ) {
          triggerGameOver();
          return;
        }

        // Add score
        if (!p.passed && ball.x > p.x + pipeWidth) {
          score += 10;
          scoreEl.innerText = score;
          p.passed = true;
        }

        // Clean memory
        if (p.x + pipeWidth < 0) {
          pipes.splice(i, 1);
        }
      }

      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('click', initGame);
  </script>
</body>
</html>
